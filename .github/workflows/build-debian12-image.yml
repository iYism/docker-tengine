name: Build-Debian12-Image

on:
  workflow_dispatch:

jobs:
  build:
    environment: "build-image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ vars.BUILD_VERSION }}"
          SHA="${{ steps.sha.outputs.short }}"

          if [[ "$VERSION" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            VERSION="${VERSION#v}"
            echo "tags=sungyism/tengine:${VERSION}-debian-12" >> $GITHUB_OUTPUT
          else
            echo "tags=sungyism/tengine:${VERSION}-debian-12-${SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push multi-platform Docker image
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for tag in "${TAGS[@]}"; do
            TAG_ARGS="$TAG_ARGS -t $tag"
          done

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -f ./debian/12/Dockerfile \
            --build-arg TENGINE_VERSION=${{ vars.BUILD_VERSION }} \
            $TAG_ARGS \
            .
